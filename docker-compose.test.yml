version: "3.8"
# # RUN line below for test in local machine # #
# # # docker compose -p mynute-frontend-test -f ./docker-compose.test.yml up -d --build --remove-orphans

# # ADD line below for test in VPS using Dokploy at Advanced > Run Command # #
# docker compose build --no-cache && docker compose up -d --force-recreate

services:
  frontend:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_URL=https://frontend-test.mynute.app
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - BACKEND_URL=${BACKEND_URL:-https://api-test.mynute.app}
    networks:
      - dokploy-network
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Single domain (path-based tenant routing): frontend-test.mynute.app/tenant-slug/...
      - "traefik.http.routers.mynute-frontend-test-http.rule=Host(`frontend-test.mynute.app`)"
      - "traefik.http.routers.mynute-frontend-test-http.entrypoints=websecure"
      - "traefik.http.routers.mynute-frontend-test-http.priority=10"
      - "traefik.http.routers.mynute-frontend-test-http.tls.certresolver=letsencrypt"
      - "traefik.http.services.mynute-frontend-test-http.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
